# Port Configuration
server:
  port: 8000
  servlet:
    context-path: ${CONTEXT_PATH:/api/v1}

spring:
  application:
    name: MeroJob-Backend

  # Database Configuration
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/merojob_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:12345678}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}

  # Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show_sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        show_sql: true


  # Config Configuration
  config:
    import:
      - classpath:config.yaml
      - optional:classpath:logging.yaml

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
redis:
  ttl:
    blacklist: 86400 # 1 day